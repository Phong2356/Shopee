<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đang chuyển hướng đến Shopee...</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #ee4d2d;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <h2>Đang mở ứng dụng Shopee...</h2>
    <div class="loader"></div>
    <p>
      Nếu hệ thống không tự chuyển, vui lòng bấm vào nút bên dưới và chọn
      <b>"Mở bằng trình duyệt" (Chrome/Safari)</b>
    </p>
    <a
      id="shopee-link"
      href="#"
      style="
        padding: 10px 20px;
        background: #ee4d2d;
        color: white;
        text-decoration: none;
        border-radius: 5px;
      "
      >Đến Shopee ngay</a
    >

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const idParam = urlParams.get("id"); // Nhận link siêu ngắn
      const urlParam = urlParams.get("url"); // Nhận link dự phòng

      // Gắn cứng ID Affiliate của bạn tại đây
      const affiliateId = "17300480426";

      if (idParam) {
        // Tách ID Shop và ID Sản phẩm
        const parts = idParam.split(".");
        if (parts.length === 2) {
          // Tự lắp ráp link gốc
          const originLink = `https://shopee.vn/product/${parts[0]}/${parts[1]}`;
          const encodedOrigin = encodeURIComponent(originLink);

          // Lắp ráp vào công thức Bất tử của Shopee và chuyển hướng
          window.location.href = `https://s.shopee.vn/an_redir?origin_link=${encodedOrigin}&affiliate_id=${affiliateId}`;
        } else {
          document.body.innerHTML =
            "<h2 style='text-align:center;'>Mã ID không hợp lệ!</h2>";
        }
      } else if (urlParam) {
        // Xử lý link dự phòng (nếu dùng link rút gọn s.shopee)
        window.location.href = urlParam;
      } else {
        document.body.innerHTML =
          "<h2 style='text-align:center; margin-top:50px;'>Không tìm thấy liên kết!</h2>";
      }
    </script>
  </body>
</html>
